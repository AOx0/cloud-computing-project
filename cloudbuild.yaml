substitutions:
  _REGION: us-central1
  _ZONE: us-central1-a
  _BUCKET_NAME: ${PROJECT_ID}-mlops-artifacts
  _BQ_DATASET_NAME: mlops_dataset
  _ARTIFACT_REGISTRY_NAME: mlops-containers
  _VERTEX_ENDPOINT_NAME: "1000000001"
  _SERVICE_ACCOUNT_NAME: mlops-vertex-pipeline
  _PIPELINE_ROOT: gs://${PROJECT_ID}-mlops-artifacts/pipeline_root
  _APPLY_TERRAFORM: "false"
  _RUN_PIPELINE: "false"

options:
  dynamic_substitutions: true

steps:
  - name: hashicorp/terraform:1.9
    id: terraform-init
    dir: infra
    args: ["init"]

  - name: hashicorp/terraform:1.9
    id: terraform-validate
    dir: infra
    args: ["validate"]

  - name: hashicorp/terraform:1.9
    id: terraform-plan
    dir: infra
    args:
      - "plan"
      - "-var=project_id=${PROJECT_ID}"
      - "-var=region=${_REGION}"
      - "-var=zone=${_ZONE}"
      - "-var=bucket_name=${_BUCKET_NAME}"
      - "-var=bq_dataset_name=${_BQ_DATASET_NAME}"
      - "-var=artifact_registry_name=${_ARTIFACT_REGISTRY_NAME}"
      - "-var=vertex_endpoint_name=${_VERTEX_ENDPOINT_NAME}"
      - "-var=service_account_name=${_SERVICE_ACCOUNT_NAME}"
      - "-var=pipeline_root=${_PIPELINE_ROOT}"

  - name: hashicorp/terraform:1.9
    id: terraform-apply-optional
    dir: infra
    entrypoint: sh
    args:
      - "-c"
      - |
        if [ "${_APPLY_TERRAFORM}" = "true" ]; then
          terraform apply -auto-approve \
            -var=project_id=${PROJECT_ID} \
            -var=region=${_REGION} \
            -var=zone=${_ZONE} \
            -var=bucket_name=${_BUCKET_NAME} \
            -var=bq_dataset_name=${_BQ_DATASET_NAME} \
            -var=artifact_registry_name=${_ARTIFACT_REGISTRY_NAME} \
            -var=vertex_endpoint_name=${_VERTEX_ENDPOINT_NAME} \
            -var=service_account_name=${_SERVICE_ACCOUNT_NAME} \
            -var=pipeline_root=${_PIPELINE_ROOT}
        else
          echo "Skipping terraform apply. Set _APPLY_TERRAFORM=true to enable it."
        fi

  - name: python:3.11
    id: compile-pipeline
    entrypoint: sh
    args:
      - "-c"
      - |
        pip install --no-cache-dir -r requirements.txt
        python pipeline/compile_pipeline.py --output pipeline/compiled/mlops_pipeline.json

  - name: gcr.io/cloud-builders/gsutil
    id: upload-pipeline-template
    args:
      - cp
      - pipeline/compiled/mlops_pipeline.json
      - gs://${_BUCKET_NAME}/pipeline_templates/mlops_pipeline.json

  - name: gcr.io/cloud-builders/docker
    id: build-serving-image
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_NAME}/mlops-serving:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_NAME}/mlops-serving:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-serving-image-sha
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_NAME}/mlops-serving:${SHORT_SHA}

  - name: gcr.io/cloud-builders/docker
    id: push-serving-image-latest
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_NAME}/mlops-serving:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: run-pipeline-optional
    entrypoint: sh
    args:
      - "-c"
      - |
        if [ "${_RUN_PIPELINE}" = "true" ]; then
          gcloud ai pipeline-jobs submit \
            --region=${_REGION} \
            --display-name=mlops-cloudbuild-run-${SHORT_SHA} \
            --pipeline-file=pipeline/compiled/mlops_pipeline.json \
            --service-account=${_SERVICE_ACCOUNT_NAME}@${PROJECT_ID}.iam.gserviceaccount.com \
            --parameter-values=project_id=${PROJECT_ID},region=${_REGION},bq_source_table=${PROJECT_ID}.${_BQ_DATASET_NAME}.synthetic_training_data,pipeline_root=${_PIPELINE_ROOT},endpoint_resource_name=projects/${PROJECT_ID}/locations/${_REGION}/endpoints/${_VERTEX_ENDPOINT_NAME},serving_container_image_uri=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_NAME}/mlops-serving:latest
        else
          echo "Skipping pipeline run. Set _RUN_PIPELINE=true to enable it."
        fi

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_NAME}/mlops-serving:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY_NAME}/mlops-serving:latest
